<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capture Gameplay</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <div class="game-shell">
    <canvas id="gameCanvas" width="1280" height="720" aria-label="2D shooter game"></canvas>
    <div id="hint" class="hint">Choose a preset and start</div>

    <div id="menuOverlay" class="menu-overlay">
      <div class="menu-panel">
        <p class="menu-eyebrow">Single Player Arena</p>
        <h1 class="menu-title">Neon Arena Shooter</h1>
        <p class="menu-copy">Capture helper</p>
        <div class="preset-grid">
          <button class="preset-button" data-preset="standard" type="button"><span class="preset-name">Standard</span></button>
          <button class="preset-button" data-preset="duel" type="button"><span class="preset-name">Duel</span></button>
          <button class="preset-button" data-preset="siege" type="button"><span class="preset-name">Siege</span></button>
        </div>
        <div id="presetSummary" class="preset-summary"></div>
        <div class="menu-actions">
          <button id="startButton" class="menu-start" type="button">Start Mission</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./src/config.js"></script>
  <script src="./src/data/weapons.js"></script>
  <script src="./src/data/items.js"></script>
  <script src="./src/platforms.js"></script>
  <script src="./src/utils.js"></script>
  <script src="./src/input.js"></script>
  <script src="./src/entities/particle.js"></script>
  <script src="./src/entities/bullet.js"></script>
  <script src="./src/entities/enemy.js"></script>
  <script src="./src/entities/pickup.js"></script>
  <script src="./src/entities/player.js"></script>
  <script src="./src/game.js"></script>
  <script src="./src/render.js"></script>
  <script src="./src/main.js"></script>
  <script>
    window.addEventListener("load", () => {
      const params = new URLSearchParams(window.location.search);
      const preset = params.get("preset") || "standard";
      const presetButton = document.querySelector(`[data-preset="${preset}"]`);
      if (presetButton) {
        presetButton.click();
      }

      setTimeout(() => {
        const startButton = document.getElementById("startButton");
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        if (startButton) {
          startButton.click();
        }

        if (window.input) {
          window.input.mouseX = 1020;
          window.input.mouseY = 260;
          window.input.pointerActive = true;
        }

        if (window.game) {
          for (let i = 0; i < 240; i += 1) {
            window.game.update(1 / 60);
          }
          renderGame(ctx, window.game);
        }
      }, 100);
    });
  </script>
</body>
</html>
